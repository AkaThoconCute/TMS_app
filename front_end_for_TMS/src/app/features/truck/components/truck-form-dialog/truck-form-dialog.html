<p-dialog
  [header]="dialogTitle"
  [(visible)]="visible"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [style]="{ width: '42rem' }"
  (onHide)="onDialogHide()"
>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-2 gap-x-5 gap-y-4 pt-2">
    <!-- License Plate -->
    <div class="flex flex-col gap-1">
      <label for="licensePlate" class="font-medium text-sm"
        >License Plate <span class="text-red-500">*</span></label
      >
      <input
        pInputText
        id="licensePlate"
        formControlName="licensePlate"
        placeholder="e.g. 1234-AB56"
      />
    </div>

    <!-- Brand -->
    <div class="flex flex-col gap-1">
      <label for="brand" class="font-medium text-sm">Brand</label>
      <input pInputText id="brand" formControlName="brand" placeholder="e.g. Hino" />
    </div>

    <!-- Truck Type -->
    <div class="flex flex-col gap-1">
      <label for="truckType" class="font-medium text-sm">Truck Type</label>
      <p-select
        id="truckType"
        formControlName="truckType"
        [options]="truckTypeOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Select type"
        [showClear]="true"
      />
    </div>

    <!-- Model Year -->
    <div class="flex flex-col gap-1">
      <label for="modelYear" class="font-medium text-sm">Model Year</label>
      <p-inputNumber
        id="modelYear"
        formControlName="modelYear"
        [useGrouping]="false"
        placeholder="e.g. 2023"
      />
    </div>

    <!-- Purchase Date -->
    <div class="flex flex-col gap-1">
      <label for="purchaseDate" class="font-medium text-sm">Purchase Date</label>
      <p-datepicker
        id="purchaseDate"
        formControlName="purchaseDate"
        dateFormat="yy-mm-dd"
        [showIcon]="true"
        placeholder="Select date"
      />
    </div>

    <!-- Ownership Type -->
    <div class="flex flex-col gap-1">
      <label for="ownershipType" class="font-medium text-sm">Ownership</label>
      <p-select
        id="ownershipType"
        formControlName="ownershipType"
        [options]="ownershipOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Select ownership"
      />
    </div>

    <!-- VIN Number -->
    <div class="flex flex-col gap-1">
      <label for="vinNumber" class="font-medium text-sm">VIN Number</label>
      <input
        pInputText
        id="vinNumber"
        formControlName="vinNumber"
        placeholder="Vehicle Identification Number"
      />
    </div>

    <!-- Engine Number -->
    <div class="flex flex-col gap-1">
      <label for="engineNumber" class="font-medium text-sm">Engine Number</label>
      <input
        pInputText
        id="engineNumber"
        formControlName="engineNumber"
        placeholder="Engine serial number"
      />
    </div>

    <!-- Max Payload -->
    <div class="flex flex-col gap-1">
      <label for="maxPayloadKg" class="font-medium text-sm">Max Payload (kg)</label>
      <p-inputNumber
        id="maxPayloadKg"
        formControlName="maxPayloadKg"
        [minFractionDigits]="0"
        [maxFractionDigits]="2"
        placeholder="e.g. 10000"
      />
    </div>

    <!-- Length -->
    <div class="flex flex-col gap-1">
      <label for="lengthMm" class="font-medium text-sm">Length (mm)</label>
      <p-inputNumber
        id="lengthMm"
        formControlName="lengthMm"
        [useGrouping]="false"
        placeholder="e.g. 8000"
      />
    </div>

    <!-- Width -->
    <div class="flex flex-col gap-1">
      <label for="widthMm" class="font-medium text-sm">Width (mm)</label>
      <p-inputNumber
        id="widthMm"
        formControlName="widthMm"
        [useGrouping]="false"
        placeholder="e.g. 2500"
      />
    </div>

    <!-- Height -->
    <div class="flex flex-col gap-1">
      <label for="heightMm" class="font-medium text-sm">Height (mm)</label>
      <p-inputNumber
        id="heightMm"
        formControlName="heightMm"
        [useGrouping]="false"
        placeholder="e.g. 3000"
      />
    </div>
  </form>

  <ng-template #footer>
    <div class="flex justify-end gap-2">
      <p-button
        label="Cancel"
        severity="secondary"
        [text]="true"
        (onClick)="visible.set(false)"
      />
      <p-button
        [label]="isEditMode ? 'Update' : 'Create'"
        icon="pi pi-check"
        [loading]="submitting()"
        [disabled]="form.invalid || submitting()"
        (onClick)="onSubmit()"
      />
    </div>
  </ng-template>
</p-dialog>
