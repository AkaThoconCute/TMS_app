<p-dialog
  [header]="dialogTitle"
  [(visible)]="visible"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [style]="{ width: '52rem' }"
  (onHide)="onDialogHide()"
>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-2 gap-x-5 gap-y-4 pt-2">
    <!-- Name (full width) -->
    <div class="flex flex-col gap-1 col-span-2">
      <label for="name" class="font-medium text-sm"
        >Name <span class="text-red-500">*</span></label
      >
      <input pInputText id="name" formControlName="name" placeholder="e.g. Công ty TNHH ABC" />
    </div>

    <!-- Phone Number -->
    <div class="flex flex-col gap-1">
      <label for="phoneNumber" class="font-medium text-sm"
        >Phone Number <span class="text-red-500">*</span></label
      >
      <input
        pInputText
        id="phoneNumber"
        formControlName="phoneNumber"
        placeholder="e.g. 0901234567"
      />
    </div>

    <!-- Email -->
    <div class="flex flex-col gap-1">
      <label for="email" class="font-medium text-sm">Email</label>
      <input
        pInputText
        id="email"
        formControlName="email"
        placeholder="e.g. contact@example.com"
      />
    </div>

    <!-- Contact Person -->
    <div class="flex flex-col gap-1">
      <label for="contactPerson" class="font-medium text-sm">Contact Person</label>
      <input
        pInputText
        id="contactPerson"
        formControlName="contactPerson"
        placeholder="e.g. Nguyễn Văn A"
      />
    </div>

    <!-- Tax Code -->
    <div class="flex flex-col gap-1">
      <label for="taxCode" class="font-medium text-sm">Tax Code</label>
      <input
        pInputText
        id="taxCode"
        formControlName="taxCode"
        placeholder="e.g. 0123456789"
      />
    </div>

    <!-- Customer Type -->
    <div class="flex flex-col gap-1">
      <label for="customerType" class="font-medium text-sm">Customer Type</label>
      <p-select
        id="customerType"
        formControlName="customerType"
        [options]="customerTypeOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Select type"
      />
    </div>

    <!-- Status -->
    <div class="flex flex-col gap-1">
      <label for="status" class="font-medium text-sm">Status</label>
      <p-select
        id="status"
        formControlName="status"
        [options]="statusOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Select status"
      />
    </div>

    <!-- Address (full width) -->
    <div class="flex flex-col gap-1 col-span-2">
      <label for="address" class="font-medium text-sm">Address</label>
      <input
        pInputText
        id="address"
        formControlName="address"
        placeholder="e.g. 123 Đường Lê Lợi, Q.1, TP.HCM"
      />
    </div>

    <!-- Notes (full width) -->
    <div class="flex flex-col gap-1 col-span-2">
      <label for="notes" class="font-medium text-sm">Notes</label>
      <textarea
        pTextarea
        id="notes"
        formControlName="notes"
        rows="3"
        placeholder="Additional notes..."
      ></textarea>
    </div>
  </form>

  <ng-template #footer>
    <div class="flex justify-end gap-2">
      <p-button label="Cancel" severity="secondary" [text]="true" (onClick)="visible.set(false)" />
      <p-button
        [label]="isEditMode ? 'Update' : 'Create'"
        icon="pi pi-check"
        [loading]="submitting()"
        [disabled]="form.invalid || submitting()"
        (onClick)="onSubmit()"
      />
    </div>
  </ng-template>
</p-dialog>
