<p-toast />
<p-confirmDialog />

<div class="p-6">
  <!-- Header -->
  <div class="flex items-center justify-between mb-5">
    <div>
      <h2 class="text-2xl font-semibold text-surface-900 dark:text-surface-0 m-0">Customers</h2>
      <p class="text-surface-500 mt-1 mb-0 text-sm">Manage your customers</p>
    </div>
    <p-button label="Add Customer" icon="pi pi-plus" (onClick)="onAdd()" />
  </div>

  <!-- Search & Filter Bar -->
  <div class="flex items-center gap-3 mb-4">
    <div class="flex items-center gap-2">
      <input
        pInputText
        placeholder="Search by name, contact or phone..."
        [value]="searchTerm()"
        (input)="searchTerm.set($any($event.target).value)"
        (keydown.enter)="onSearch()"
        class="w-80"
      />
      <p-button
        icon="pi pi-search"
        [outlined]="true"
        (onClick)="onSearch()"
        pTooltip="Search"
        tooltipPosition="top"
      />
    </div>
    <p-select
      [options]="statusFilterOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="Filter by status"
      [ngModel]="statusFilter()"
      (ngModelChange)="onStatusFilterChange($event)"
      class="w-48"
    />
    <p-select
      [options]="customerTypeFilterOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="Filter by type"
      [ngModel]="customerTypeFilter()"
      (ngModelChange)="onCustomerTypeFilterChange($event)"
      class="w-48"
    />
  </div>

  <!-- Table -->
  <p-table
    [value]="customers()"
    [lazy]="true"
    [loading]="loading()"
    [paginator]="true"
    [rows]="rows()"
    [totalRecords]="totalRecords()"
    [rowsPerPageOptions]="rowsPerPageOptions"
    [first]="first()"
    (onLazyLoad)="loadCustomers($event)"
    [tableStyle]="{ 'min-width': '70rem' }"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} customers"
    dataKey="customerId"
    stripedRows
  >
    <ng-template #header>
      <tr>
        <th>Name</th>
        <th>Contact Person</th>
        <th>Phone Number</th>
        <th>Email</th>
        <th>Customer Type</th>
        <th>Status</th>
        <th style="width: 10rem; text-align: center">Actions</th>
      </tr>
    </ng-template>

    <ng-template #body let-customer>
      <tr>
        <td class="font-semibold">{{ customer.name }}</td>
        <td>{{ customer.contactPerson ?? '—' }}</td>
        <td>{{ customer.phoneNumber }}</td>
        <td>{{ customer.email ?? '—' }}</td>
        <td>
          <p-tag
            [value]="getCustomerTypeLabel(customer.customerType)"
            [severity]="getCustomerTypeSeverity(customer.customerType)"
          />
        </td>
        <td>
          <p-tag
            [value]="getStatusLabel(customer.status)"
            [severity]="getStatusSeverity(customer.status)"
          />
        </td>
        <td style="text-align: center">
          <div class="flex items-center justify-center gap-2">
            <p-button
              icon="pi pi-pencil"
              [rounded]="true"
              [text]="true"
              severity="info"
              pTooltip="Edit"
              tooltipPosition="top"
              (onClick)="onEdit(customer)"
            />
            <p-button
              icon="pi pi-trash"
              [rounded]="true"
              [text]="true"
              severity="danger"
              pTooltip="Delete"
              tooltipPosition="top"
              (onClick)="onDelete(customer)"
            />
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="7" class="text-center py-8">
          <div class="flex flex-col items-center gap-3">
            <i class="pi pi-users text-4xl text-surface-400"></i>
            <span class="text-surface-500 text-lg">No customers found</span>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<!-- Create / Edit Dialog -->
<app-customer-form-dialog
  [customer]="editingCustomer()"
  [(visible)]="formDialogVisible"
  [submitting]="submitting()"
  (saved)="onFormSaved($event)"
  (closed)="onFormClosed($event)"
/>
