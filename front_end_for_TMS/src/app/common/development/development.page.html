<div class="flex flex-col items-center justify-center min-h-[70vh] p-4 text-center bg-gray-50">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">Under Development</h1>
    <p class="text-gray-500 max-w-md mx-auto">
      This feature is currently being built or is scheduled for future release. Stay tuned for
      updates!
    </p>
  </div>

  <div
    class="max-w-sm w-full bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden"
  >
    <div class="pt-6 px-4">
      <h2 class="text-lg font-semibold text-gray-800">Support the Team</h2>
    </div>

    <div class="p-6">
      <div
        class="bg-blue-50 p-4 rounded-xl border border-blue-100 mb-4 transition-all hover:bg-blue-100"
      >
        <p class="text-xs uppercase tracking-wider text-blue-600 font-bold mb-1">
          {{ supportAccount.bank }}
        </p>
        <p class="text-xl font-mono text-gray-800 font-semibold tracking-tight">
          {{ supportAccount.number }}
        </p>
        <p class="text-sm text-gray-600 mt-2 font-medium">
          {{ supportAccount.owner }}
        </p>
      </div>
      <p class="text-xs text-gray-400 italic">
        Your support helps us speed up the development process.
      </p>
    </div>

    <div class="pb-6 px-4 flex justify-center">
      <button
        (click)="copyAccount()"
        class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-full transition-colors duration-200 shadow-sm active:scale-95"
      >
        Copy Account Number
      </button>
    </div>
  </div>
</div>
